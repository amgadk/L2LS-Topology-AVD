!
no enable password
no aaa root
!
vlan internal order ascending range 1006 1199
!
transceiver qsfp default-mode 4x10G
!
service routing protocols model multi-agent
!
hostname SPINE1
ip domain lookup source-interface Management1
ip name-server vrf default 8.8.4.4
ip name-server vrf default 8.8.8.8
!
spanning-tree mode mstp
no spanning-tree vlan-id 4093-4094
spanning-tree mst 0 priority 4096
!
vlan 10
   name Ten
!
vlan 20
   name Twenty
!
vlan 4093
   name MLAG_L3
   trunk group MLAG
!
vlan 4094
   name MLAG
   trunk group MLAG
!
management api http-commands
   protocol https
   no shutdown
   !
   vrf default
      no shutdown
!
interface Port-Channel1
   description L2_RACK1_Port-Channel1
   no shutdown
   switchport trunk allowed vlan 10,20
   switchport mode trunk
   switchport
   mlag 1
!
interface Port-Channel3
   description L2_RACK2_Port-Channel1
   no shutdown
   switchport trunk allowed vlan 10,20
   switchport mode trunk
   switchport
   mlag 3
!
interface Port-Channel5
   description FIREWALL_FIREWALL
   no shutdown
   switchport trunk allowed vlan 10,20,30
   switchport mode trunk
   switchport
   mlag 5
!
interface Port-Channel47
   description MLAG_SPINE2_Port-Channel47
   no shutdown
   switchport mode trunk
   switchport trunk group MLAG
   switchport
!
interface Ethernet1
   description L2_LEAF1_Ethernet1
   no shutdown
   channel-group 1 mode active
!
interface Ethernet2
   description L2_LEAF2_Ethernet1
   no shutdown
   channel-group 1 mode active
!
interface Ethernet3
   description L2_LEAF3_Ethernet1
   no shutdown
   channel-group 3 mode active
!
interface Ethernet4
   description L2_LEAF4_Ethernet1
   no shutdown
   channel-group 3 mode active
!
interface Ethernet5
   description FIREWALL_FIREWALL_Eth1
   no shutdown
   channel-group 5 mode active
!
interface Ethernet47
   description MLAG_SPINE2_Ethernet47
   no shutdown
   channel-group 47 mode active
!
interface Ethernet48
   description MLAG_SPINE2_Ethernet48
   no shutdown
   channel-group 47 mode active
!
interface Loopback0
   description ROUTER_ID
   no shutdown
   ip address 10.255.0.1/32
!
interface Management1
   description OOB_MANAGEMENT
   no shutdown
   ip address 192.168.0.111/24
!
interface Vlan10
   description Ten
   no shutdown
   ip address 10.10.10.2/24
   ip virtual-router address 10.10.10.1
!
interface Vlan20
   description Twenty
   no shutdown
   ip address 10.20.20.2/24
   ip virtual-router address 10.20.20.1
!
interface Vlan4093
   description MLAG_L3
   no shutdown
   mtu 1500
   ip address 10.255.1.0/31
!
interface Vlan4094
   description MLAG
   no shutdown
   mtu 1500
   no autostate
   ip address 172.16.100.0/31
!
ip virtual-router mac-address 00:1c:73:00:dc:01
!
ip routing
!
mlag configuration
   domain-id SPINES
   local-interface Vlan4094
   peer-address 172.16.100.1
   peer-link Port-Channel47
   reload-delay mlag 300
   reload-delay non-mlag 330
!
ntp local-interface Management1
ntp server pool.ntp.org
ntp server time.google.com prefer
!
route-map RM-MLAG-PEER-IN permit 10
   description Make routes learned over MLAG Peer-link less preferred on spines to ensure optimal routing
   set origin incomplete
!
router bgp 65000
   router-id 10.255.0.1
   no bgp default ipv4-unicast
   maximum-paths 4
   neighbor MLAG-IPv4-UNDERLAY-PEER peer group
   neighbor MLAG-IPv4-UNDERLAY-PEER remote-as 65000
   neighbor MLAG-IPv4-UNDERLAY-PEER next-hop-self
   neighbor MLAG-IPv4-UNDERLAY-PEER description SPINE2
   neighbor MLAG-IPv4-UNDERLAY-PEER route-map RM-MLAG-PEER-IN in
   neighbor MLAG-IPv4-UNDERLAY-PEER send-community
   neighbor MLAG-IPv4-UNDERLAY-PEER maximum-routes 256000
   neighbor 10.255.1.1 peer group MLAG-IPv4-UNDERLAY-PEER
   neighbor 10.255.1.1 description SPINE2_Vlan4093
   redistribute connected
   !
   address-family ipv4
      neighbor MLAG-IPv4-UNDERLAY-PEER activate
!
end
