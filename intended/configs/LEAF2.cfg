!
no enable password
no aaa root
!
vlan internal order ascending range 1006 1199
!
transceiver qsfp default-mode 4x10G
!
service routing protocols model multi-agent
!
hostname LEAF2
ip domain lookup source-interface Management1
ip name-server vrf default 8.8.4.4
ip name-server vrf default 8.8.8.8
!
spanning-tree mode mstp
no spanning-tree vlan-id 4094
spanning-tree mst 0 priority 16384
!
vlan 10
   name Ten
!
vlan 20
   name Twenty
!
vlan 30
   name Thirty
!
vlan 40
   name Fourty
!
vlan 4094
   name MLAG
   trunk group MLAG
!
management api http-commands
   protocol https
   no shutdown
   !
   vrf default
      no shutdown
!
interface Port-Channel1
   description L2_SPINES_Port-Channel1
   no shutdown
   switchport trunk allowed vlan 10,20,30,40
   switchport mode trunk
   switchport
   mlag 1
!
interface Port-Channel47
   description MLAG_LEAF1_Port-Channel47
   no shutdown
   switchport mode trunk
   switchport trunk group MLAG
   switchport
!
interface Ethernet1
   description L2_SPINE1_Ethernet2
   no shutdown
   channel-group 1 mode active
!
interface Ethernet2
   description L2_SPINE2_Ethernet2
   no shutdown
   channel-group 1 mode active
!
interface Ethernet3
   description SERVER_Host2_Eth1
   no shutdown
   switchport access vlan 20
   switchport mode access
   switchport
   spanning-tree portfast
!
interface Ethernet4
   description SERVER_Host22_Eth1
   no shutdown
   switchport access vlan 40
   switchport mode access
   switchport
   spanning-tree portfast
!
interface Ethernet47
   description MLAG_LEAF1_Ethernet47
   no shutdown
   channel-group 47 mode active
!
interface Ethernet48
   description MLAG_LEAF1_Ethernet48
   no shutdown
   channel-group 47 mode active
!
interface Management1
   description OOB_MANAGEMENT
   no shutdown
   ip address 192.168.0.21/24
!
interface Vlan4094
   description MLAG
   no shutdown
   mtu 1500
   no autostate
   ip address 172.16.100.1/31
!
mlag configuration
   domain-id RACK1
   local-interface Vlan4094
   peer-address 172.16.100.0
   peer-link Port-Channel47
   reload-delay mlag 300
   reload-delay non-mlag 330
!
ntp local-interface Management1
ntp server pool.ntp.org
ntp server time.google.com prefer
!
end
