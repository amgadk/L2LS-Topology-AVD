aaa_root:
  disabled: true
config_end: true
enable_password:
  disabled: true
ethernet_interfaces:
- name: Ethernet47
  description: MLAG_SPINE1_Ethernet47
  shutdown: false
  channel_group:
    id: 47
    mode: active
  metadata:
    peer: SPINE1
    peer_interface: Ethernet47
    peer_type: mlag_peer
- name: Ethernet48
  description: MLAG_SPINE1_Ethernet48
  shutdown: false
  channel_group:
    id: 47
    mode: active
  metadata:
    peer: SPINE1
    peer_interface: Ethernet48
    peer_type: mlag_peer
- name: Ethernet1
  description: L2_LEAF1_Ethernet2
  shutdown: false
  channel_group:
    id: 1
    mode: active
  metadata:
    peer: LEAF1
    peer_interface: Ethernet2
    peer_type: l2leaf
- name: Ethernet2
  description: L2_LEAF2_Ethernet2
  shutdown: false
  channel_group:
    id: 1
    mode: active
  metadata:
    peer: LEAF2
    peer_interface: Ethernet2
    peer_type: l2leaf
- name: Ethernet3
  description: L2_LEAF3_Ethernet2
  shutdown: false
  channel_group:
    id: 3
    mode: active
  metadata:
    peer: LEAF3
    peer_interface: Ethernet2
    peer_type: l2leaf
- name: Ethernet4
  description: L2_LEAF4_Ethernet2
  shutdown: false
  channel_group:
    id: 3
    mode: active
  metadata:
    peer: LEAF4
    peer_interface: Ethernet2
    peer_type: l2leaf
- name: Ethernet5
  description: FIREWALL_FIREWALL_Eth2
  shutdown: false
  channel_group:
    id: 5
    mode: active
  metadata:
    peer: FIREWALL
    peer_interface: Eth2
    peer_type: firewall
    peer_key: firewalls
    port_profile: PP-FIREWALL
hostname: SPINE2
ip_domain_lookup:
  source_interfaces:
  - name: Management1
ip_igmp_snooping:
  globally_enabled: true
ip_name_server:
  vrfs:
  - name: default
    servers:
    - ip_address: 8.8.4.4
    - ip_address: 8.8.8.8
ip_routing: true
ip_virtual_router_mac_address: 00:1c:73:00:dc:01
loopback_interfaces:
- name: Loopback0
  description: ROUTER_ID
  shutdown: false
  ip_address: 10.255.0.2/32
management_api_http:
  enable_https: true
  enable_vrfs:
  - name: default
management_interfaces:
- name: Management1
  description: OOB_MANAGEMENT
  shutdown: false
  vrf: default
  ip_address: 192.168.0.112/24
  type: oob
metadata:
  is_deployed: true
  platform: cEOSLab
  fabric_name: DC1
  validate_hardware:
    enabled: false
mlag_configuration:
  domain_id: SPINES
  local_interface: Vlan4094
  peer_address: 172.16.100.0
  peer_link: Port-Channel47
  reload_delay_mlag: '300'
  reload_delay_non_mlag: '330'
ntp:
  local_interface:
    name: Management1
    vrf: default
  servers:
  - name: time.google.com
    preferred: true
  - name: pool.ntp.org
  vrf: default
port_channel_interfaces:
- name: Port-Channel47
  description: MLAG_SPINE1_Port-Channel47
  shutdown: false
  switchport:
    enabled: true
    mode: trunk
    trunk:
      groups:
      - MLAG
- name: Port-Channel1
  description: L2_RACK1_Port-Channel1
  shutdown: false
  mlag: 1
  switchport:
    enabled: true
    mode: trunk
    trunk:
      allowed_vlan: 10,20
- name: Port-Channel3
  description: L2_RACK2_Port-Channel1
  shutdown: false
  mlag: 3
  switchport:
    enabled: true
    mode: trunk
    trunk:
      allowed_vlan: 10,20
- name: Port-Channel5
  description: FIREWALL_FIREWALL
  shutdown: false
  mlag: 5
  switchport:
    enabled: true
    mode: trunk
    trunk:
      allowed_vlan: 10,20,30
route_maps:
- name: RM-MLAG-PEER-IN
  sequence_numbers:
  - sequence: 10
    type: permit
    description: Make routes learned over MLAG Peer-link less preferred on spines to ensure optimal routing
    set:
    - origin incomplete
router_bgp:
  as: '65000'
  router_id: 10.255.0.2
  maximum_paths:
    paths: 4
  bgp:
    default:
      ipv4_unicast: false
  peer_groups:
  - name: MLAG-IPv4-UNDERLAY-PEER
    metadata:
      type: ipv4
    remote_as: '65000'
    description: SPINE1
    next_hop_self: true
    send_community: all
    maximum_routes: 256000
    route_map_in: RM-MLAG-PEER-IN
  neighbors:
  - ip_address: 10.255.1.0
    peer_group: MLAG-IPv4-UNDERLAY-PEER
    metadata:
      peer: SPINE1
    description: SPINE1_Vlan4093
  redistribute:
    connected:
      enabled: true
  address_family_ipv4:
    peer_groups:
    - name: MLAG-IPv4-UNDERLAY-PEER
      activate: true
service_routing_protocols_model: multi-agent
spanning_tree:
  mode: mstp
  mst_instances:
  - id: '0'
    priority: 4096
  no_spanning_tree_vlan: 4093-4094
transceiver_qsfp_default_mode_4x10: true
vlan_interfaces:
- name: Vlan4093
  description: MLAG_L3
  shutdown: false
  ip_address: 10.255.1.1/31
  mtu: 1500
- name: Vlan4094
  description: MLAG
  shutdown: false
  ip_address: 172.16.100.1/31
  mtu: 1500
  no_autostate: true
- name: Vlan10
  description: Ten
  shutdown: false
  ip_address: 10.10.10.3/24
  ip_virtual_router_addresses:
  - 10.10.10.1
  metadata:
    tenants:
    - MY_FABRIC
    tags:
    - Web
- name: Vlan20
  description: Twenty
  shutdown: false
  ip_address: 10.20.20.3/24
  ip_virtual_router_addresses:
  - 10.20.20.1
  metadata:
    tenants:
    - MY_FABRIC
    tags:
    - App
vlan_internal_order:
  allocation: ascending
  range:
    beginning: 1006
    ending: 1199
vlans:
- id: 4093
  name: MLAG_L3
  trunk_groups:
  - MLAG
  metadata:
    tenants:
    - system
- id: 4094
  name: MLAG
  trunk_groups:
  - MLAG
  metadata:
    tenants:
    - system
- id: 10
  name: Ten
  metadata:
    tenants:
    - MY_FABRIC
- id: 20
  name: Twenty
  metadata:
    tenants:
    - MY_FABRIC
vrfs:
- name: default
  ip_routing: false
